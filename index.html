<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>此刻是春天 · 冰雪消融</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
            background-color: #0d1b2a;
            user-select: none;
        }

        /* 1. 春水背景 */
        .river-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 50%, #8fd3f4 100%);
            background-size: 200% 200%;
            animation: flowRiver 8s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes flowRiver {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. 流淌的句子 (层级100) */
        #quotes-container {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 600px;
            text-align: center;
            z-index: 100; 
            pointer-events: none;
        }

        .quote-line {
            font-size: 19px;
            line-height: 2.2;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5), 0 0 15px rgba(255,255,255,0.3);
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 2.5s ease;
            letter-spacing: 2px;
        }

        .quote-line.flow { opacity: 1; transform: translateY(0); }
        .quote-line.highlight { font-size: 24px; color: #ffebcc; font-weight: bold; margin-top: 50px; }

        /* 3. 冰面 (层级50) */
        #ice-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(140,170,200,0.8) 0%, rgba(90,120,150,0.95) 100%);
            backdrop-filter: blur(15px) grayscale(0.5);
            -webkit-backdrop-filter: blur(15px) grayscale(0.5);
            z-index: 50;
            cursor: pointer;
            transition: opacity 5s ease-in-out;
            display: flex; justify-content: center; align-items: center;
        }

        .hint-text {
            font-size: 18px; color: #3b4e65; letter-spacing: 5px; font-weight: bold;
            background: rgba(255,255,255,0.85); padding: 15px 35px; border-radius: 40px;
            pointer-events: none; transition: opacity 0.5s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 4. 从裂痕到花朵 (罪魁祸首修复：层级提高到了60，压在冰面上！) */
        .morph-container {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 60; /* 绝对不能被冰挡住 */
            pointer-events: none;
        }

        .sharp-crack {
            position: absolute;
            top: 50%; left: 50%;
            height: 3px; 
            background: #ffffff;
            box-shadow: 0 0 15px #ffffff, 0 0 8px #89f7fe; 
            transform-origin: center;
            opacity: 0;
            border-radius: 5px;
        }

        .crack-burst {
            animation: burstAndFade 3s ease-out forwards;
        }

        @keyframes burstAndFade {
            0% { transform: translate(-50%, -50%) rotate(var(--rot)) scale(0); opacity: 1; }
            10% { transform: translate(-50%, -50%) rotate(var(--rot)) scale(1); opacity: 1; }
            30% { transform: translate(-50%, -50%) rotate(var(--rot)) scale(1.05); opacity: 1; } /* 停留让你看清 */
            100% { transform: translate(-50%, -50%) rotate(var(--rot)) scale(1.4); opacity: 0; filter: blur(5px); }
        }

        .flower-emoji {
            position: absolute;
            top: 50%; left: 50%;
            font-size: 50px;
            transform: translate(-50%, -50%) scale(0) rotate(-45deg);
            opacity: 0;
        }

        .flower-morph {
            animation: morphIceToFlower 4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 1.2s; /* 裂缝刚开始消散，花就长出来 */
        }

        @keyframes morphIceToFlower {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-45deg); opacity: 0; filter: grayscale(100%) brightness(120%); }
            15% { transform: translate(-50%, -50%) scale(0.6) rotate(-20deg); opacity: 1; filter: grayscale(100%) brightness(120%); }
            100% { transform: translate(-50%, -50%) scale(1.1) rotate(15deg); opacity: 0.8; filter: grayscale(0%) saturate(80%) brightness(105%); text-shadow: 0 0 20px rgba(255,255,255,0.7);}
        }

    </style>
</head>
<body>

    <div class="river-bg"></div>

    <div id="quotes-container">
        <div class="quote-line">起初，生活就像是孤岛，人与人的联系是那么脆弱。</div>
        <div class="quote-line">直到你遇到了一双有温度的手，或者一只柔软的小猫。</div>
        <div class="quote-line">你开始发现，就因为是朋友，所以才可以互相麻烦。</div>
        <div class="quote-line">倘若死亡是凝固的夜晚，生就是升起的朝阳和流动的微风。</div>
        <div class="quote-line highlight">春天不是一个季节，而是心灵慢慢解冻，再次开始流淌。</div>
    </div>

    <div id="ice-layer" onclick="triggerThaw(event)">
        <div class="hint-text" id="hint">点击冰面，呼唤春天</div>
    </div>

    <audio id="bgMusic" loop>
        <source src="spring-bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        let isThawing = false;
        const iceLayer = document.getElementById('ice-layer');
        // 加入了你最开始提到的小猫！(小彩蛋，偷偷藏在花丛里)
        const flowersList = ['💮', '🌸', '🪷', '🌼', '🤍', '🐱']; 

        function triggerThaw(e) {
            if (isThawing) return;
            isThawing = true;

            document.getElementById('hint').style.opacity = '0';
            const bgm = document.getElementById('bgMusic');
            bgm.play().catch(err => console.log("等待交互..."));

            spawnCrackToFlower(e.clientX, e.clientY);
            
            for (let i = 0; i < 9; i++) {
                setTimeout(() => {
                    const randX = 10 + Math.random() * (window.innerWidth - 20);
                    const randY = 10 + Math.random() * (window.innerHeight - 20);
                    spawnCrackToFlower(randX, randY);
                }, i * 200 + Math.random() * 100); 
            }

            setTimeout(() => {
                iceLayer.style.opacity = '0';
                setTimeout(() => { iceLayer.style.display = 'none'; }, 5000);
            }, 2500); 

            setTimeout(() => {
                const quotes = document.querySelectorAll('.quote-line');
                quotes.forEach((quote, index) => {
                    setTimeout(() => { quote.classList.add('flow'); }, index * 2500);
                });
            }, 5500);
        }

        function spawnCrackToFlower(x, y) {
            const container = document.createElement('div');
            container.className = 'morph-container';
            container.style.left = x + 'px';
            container.style.top = y + 'px';

            const linesCount = 6 + Math.floor(Math.random() * 4); 
            for (let i = 0; i < linesCount; i++) {
                const line = document.createElement('div');
                line.className = 'sharp-crack crack-burst';
                line.style.setProperty('--rot', `${Math.random() * 180}deg`);
                line.style.width = (100 + Math.random() * 150) + 'px'; 
                container.appendChild(line);
            }

            const flower = document.createElement('div');
            flower.className = 'flower-emoji flower-morph';
            flower.innerText = flowersList[Math.floor(Math.random() * flowersList.length)];
            flower.style.fontSize = (45 + Math.random() * 40) + 'px'; 
            container.appendChild(flower);

            document.body.appendChild(container);
        }
    </script>
</body>
</html>
